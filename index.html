<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>CSS image zoom 🔍😅 (Click to change image, wheel to zoom in/out)</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="zoomer"><img class="zoomer__img"/>
  <div class="zoomer__viewfinder">
    <svg class="magnifying-glass zoomer__magnifying-glass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 245 328">
      <g stroke-linecap="round" stroke-linejoin="round" transform="rotate(-30 57 -316)">
        <rect class="magnifying-glass__handle" width="11.3" height="98.1" x="-115" y="186" ry=".6" stroke-width="5.3"></rect>
        <rect class="magnifying-glass__grip" width="27.8" height="113" x="-123" y="211" ry="9.1" stroke-width="5.3"></rect>
        <g class="magnifying-glass__lens" transform="rotate(-60 -154 104)">
          <circle class="magnifying-glass__glass" r="94.3" cx="-113" cy="132.6" stroke-width="4.5"></circle>
          <path class="magnifying-glass__frame" d="M-113 22a110 110 0 00-110 111 110 110 0 00110 110A110 110 0 00-3 133 110 110 0 00-113 22zm0 16a94 94 0 0194 95 94 94 0 01-94 94 94 94 0 01-94-94 94 94 0 0194-95z" stroke-width="5.3"></path>
        </g>
        <path class="magnifying-glass__shine" d="M-72 20a74 74 0 0132 90M-55 134a74 74 0 01-5 4" stroke-width="13.2"></path>
      </g>
    </svg>
    <div class="zoomer__viewfinder-image-wrapper"><img class="zoomer__viewfinder-img"/></div>
  </div>
</div>
<h1>:hover</h1>
    <script  src="./script.js"></script>

  </body>
  
</html>
